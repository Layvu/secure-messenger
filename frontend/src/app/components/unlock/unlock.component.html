<div class="unlock-wrap">
  <div class="card">
    <h2>DM</h2>
    <p class="subtitle">Введите PIN для разблокировки</p>

    <input
      class="input pin-input"
      type="password"
      inputmode="numeric"
      [ngModel]="pin()"
      (ngModelChange)="pin.set($event)"
      maxlength="6"
      placeholder="••••••"
      autocomplete="current-password"
      (keyup.enter)="unlock()"
      [disabled]="loading()"
    />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    @if (loading()) {
      <div class="spinner-row">
        <div class="spinner"></div>
        <span>Открываем чаты…</span>
      </div>
    } @else {
      <button class="btn btn-primary" (click)="unlock()" [disabled]="pin().length !== 6">
        Разблокировать
      </button>
    }

    <button class="btn-link" (click)="goToOnboarding()">Другой аккаунт / восстановить</button>
  </div>
</div>
